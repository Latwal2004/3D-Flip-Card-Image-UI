<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D-Flip-Card-Image</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <section>
        <div class="container">
            <div class="card front-face">
                <header>
                    <span class="logo">
                        <img src="Assets/logo.png" alt="">
                        <h5>Master Card</h5>
                    </span>
                    <img src="Assets/chip.png" alt="" class="chip">
                </header>



                <div class="card-details">
                    <div class="name-number">
                        <h6>Card number</h6>
                        <h5 class="number">8050 2030 5040</h5>
                        <h5 class="name">Harish Latwal</h5>
                    </div>

                    <div class="valid-date">
                        <h6>Valid Thru</h6>
                        <h5>05/28</h5>
                    </div>
                </div>
            </div>

            
        </div>
    </section>

</body>

</html>
